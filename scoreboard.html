<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sdeng TV — Tabellone</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #e84e1b;
    --orange-dark: #b33a12;
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    gap: 0;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    margin-top: 8px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.04em;
    color: var(--orange);
    line-height: 1;
  }
  .logo-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-divider {
    width: 2px;
    height: 36px;
    background: var(--border);
  }

  /* SETUP PANEL */
  .setup-panel {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .setup-panel.hidden { display: none; }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .setup-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .setup-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .setup-row input::placeholder { color: var(--muted); text-transform: uppercase; }
  .setup-row input:focus { border-color: var(--orange); }

  .btn-start {
    width: 100%;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-start:active { background: var(--orange-dark); }

  /* SCOREBOARD */
  .scoreboard {
    width: 100%;
    max-width: 480px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  .scoreboard.visible { display: flex; }

  /* MATCH NAME */
  .match-info {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: -4px;
  }

  /* SCORE DISPLAY */
  .score-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
  }

  .team-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 10px 14px;
    gap: 4px;
  }

  .team-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    line-height: 1;
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1;
    max-width: 130px;
    text-align: center;
    word-break: break-word;
  }

  .score-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    position: relative;
  }
  .score-divider::before {
    content: '';
    position: absolute;
    top: 12px; bottom: 12px;
    left: 50%;
    width: 1px;
    background: var(--border);
    transform: translateX(-50%);
  }

  .score-numbers {
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 5rem);
    line-height: 1;
    color: var(--text);
    min-width: 2ch;
    text-align: center;
    transition: transform 0.08s ease;
  }
  .score-num.bump {
    color: var(--orange);
    transform: scale(1.12);
  }

  .score-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 7vw, 3rem);
    color: var(--border);
    line-height: 1;
    margin-top: -4px;
  }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .team-controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .team-ctrl-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
  }

  .pts-btns {
    display: flex;
    gap: 6px;
  }

  .btn-pts {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    padding: 12px 0;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    position: relative;
    overflow: hidden;
  }
  .btn-pts:active {
    background: var(--orange);
    border-color: var(--orange);
    transform: scale(0.95);
  }

  .btn-minus {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 7px 0;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-minus:active { color: var(--orange); border-color: var(--orange); }

  /* BOTTOM ACTIONS */
  .bottom-actions {
    display: flex;
    gap: 10px;
  }

  .btn-action {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 0;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-action:active { color: var(--text); border-color: var(--text); }
  .btn-action.danger:active { color: var(--orange); border-color: var(--orange); }

  /* TAGLINE */
  .tagline {
    margin-top: 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: #333;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-text">SDENG TV</div>
    <div class="logo-sub">Bologna</div>
  </div>
  <div class="header-divider"></div>
  <div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.08em;color:#f0f0f0;">Tabellone</div>
    <div class="logo-sub">Diretta</div>
  </div>
</div>

<!-- SETUP -->
<div class="setup-panel" id="setupPanel">
  <div class="setup-title">Squadre</div>
  <div class="setup-row">
    <input type="text" id="homeName" placeholder="Casa" maxlength="20">
    <input type="text" id="awayName" placeholder="Ospiti" maxlength="20">
  </div>
  <button class="btn-start" onclick="startMatch()">Inizia partita</button>
</div>

<!-- SCOREBOARD -->
<div class="scoreboard" id="scoreboard">

  <div class="match-info" id="matchInfo">Casa — Ospiti</div>

  <div class="score-display">
    <div class="score-row">
      <div class="team-block">
        <div class="team-label">Casa</div>
        <div class="team-name" id="homeLabel">—</div>
      </div>
      <div class="score-divider">
        <div class="score-numbers">
          <div class="score-num" id="homeScore">0</div>
          <div class="score-sep">–</div>
          <div class="score-num" id="awayScore">0</div>
        </div>
      </div>
      <div class="team-block">
        <div class="team-label">Ospiti</div>
        <div class="team-name" id="awayLabel">—</div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <!-- CASA -->
    <div class="team-controls">
      <div class="team-ctrl-label" id="homeCtrlLabel">Casa</div>
      <div class="pts-btns">
        <button class="btn-pts" onclick="addPoints('home',1)">+1</button>
        <button class="btn-pts" onclick="addPoints('home',2)">+2</button>
        <button class="btn-pts" onclick="addPoints('home',3)">+3</button>
      </div>
      <button class="btn-minus" onclick="addPoints('home',-1)">– 1 punto</button>
    </div>
    <!-- OSPITI -->
    <div class="team-controls">
      <div class="team-ctrl-label" id="awayCtrlLabel">Ospiti</div>
      <div class="pts-btns">
        <button class="btn-pts" onclick="addPoints('away',1)">+1</button>
        <button class="btn-pts" onclick="addPoints('away',2)">+2</button>
        <button class="btn-pts" onclick="addPoints('away',3)">+3</button>
      </div>
      <button class="btn-minus" onclick="addPoints('away',-1)">– 1 punto</button>
    </div>
  </div>

  <div class="bottom-actions">
    <button class="btn-action" onclick="resetScores()">Azzera punteggio</button>
    <button class="btn-action danger" onclick="newMatch()">Nuova partita</button>
  </div>

</div>

<div class="tagline">Il ferro è servito</div>

<script>
  let scores = { home: 0, away: 0 };

  function startMatch() {
    const home = document.getElementById('homeName').value.trim().toUpperCase() || 'CASA';
    const away = document.getElementById('awayName').value.trim().toUpperCase() || 'OSPITI';

    document.getElementById('homeLabel').textContent = home;
    document.getElementById('awayLabel').textContent = away;
    document.getElementById('homeCtrlLabel').textContent = home;
    document.getElementById('awayCtrlLabel').textContent = away;
    document.getElementById('matchInfo').textContent = `${home}  —  ${away}`;

    scores = { home: 0, away: 0 };
    updateDisplay();

    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('scoreboard').classList.add('visible');
  }

  function addPoints(team, pts) {
    scores[team] = Math.max(0, scores[team] + pts);
    updateDisplay(team);
  }

  function updateDisplay(bumpTeam) {
    const homeEl = document.getElementById('homeScore');
    const awayEl = document.getElementById('awayScore');

    homeEl.textContent = scores.home;
    awayEl.textContent = scores.away;

    if (bumpTeam) {
      const el = bumpTeam === 'home' ? homeEl : awayEl;
      el.classList.remove('bump');
      void el.offsetWidth; // reflow
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }
  }

  function resetScores() {
    if (confirm('Azzerare il punteggio?')) {
      scores = { home: 0, away: 0 };
      updateDisplay();
    }
  }

  function newMatch() {
    if (confirm('Iniziare una nuova partita?')) {
      document.getElementById('homeName').value = '';
      document.getElementById('awayName').value = '';
      document.getElementById('setupPanel').classList.remove('hidden');
      document.getElementById('scoreboard').classList.remove('visible');
    }
  }

  // Enter key sul setup
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('setupPanel').classList.contains('hidden')) {
      startMatch();
    }
  });
</script>
</body>
</html>

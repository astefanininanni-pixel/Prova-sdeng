<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sdeng TV — Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #e84e1b;
    --orange-dark: #b33a12;
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    margin-top: 4px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
    color: var(--orange);
  }
  .logo-sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; }
  .hdiv { width: 2px; height: 30px; background: var(--border); }

  /* STATUS */
  .status {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
  }
  .status.connected { border-color: #2a7a2a; color: #4caf50; }
  .status.error { border-color: #7a2a2a; color: #f44336; }

  /* SETUP */
  .setup-panel { width: 100%; max-width: 400px; }
  .setup-panel.hidden { display: none; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    width: 100%;
    max-width: 400px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .input-row { display: flex; gap: 8px; }

  input[type=text] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 12px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--orange); }

  .btn-primary {
    width: 100%;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    padding: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .btn-primary:active { background: var(--orange-dark); transform: scale(0.97); }

  /* SCOREBOARD LIVE */
  .scoreboard { width: 100%; max-width: 400px; display: none; flex-direction: column; gap: 10px; }
  .scoreboard.visible { display: flex; }

  .score-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px 12px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }

  .team-info { text-align: center; }
  .t-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--muted); }
  .t-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--text); }

  .score-mid { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 10vw, 4rem);
    color: var(--text);
    min-width: 2ch;
    text-align: center;
    line-height: 1;
    transition: color 0.15s;
  }
  .score-num.bump { color: var(--orange); }
  .score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--border); }

  /* CONTROLS GRID */
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .team-ctrl {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; color: var(--muted); text-align: center; }

  .pts-row { display: flex; gap: 5px; }

  .btn-pts {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    padding: 14px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, transform 0.08s;
    border: 1px solid var(--border);
  }
  .btn-pts:active { background: var(--orange); border-color: var(--orange); transform: scale(0.93); }

  .btn-undo {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 7px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-undo:active { color: var(--orange); border-color: var(--orange); }

  .bottom-row { display: flex; gap: 8px; }
  .btn-action {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-action:active { color: var(--text); border-color: var(--text); }
  .btn-action.danger:active { color: var(--orange); border-color: var(--orange); }

  .tagline {
    margin-top: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: #2a2a2a;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-text">SDENG TV</div>
    <div class="logo-sub">CONTROLLER</div>
  </div>
  <div class="hdiv"></div>
  <div class="logo-sub" style="font-size:0.65rem;line-height:1.4;">BOLOGNA<br>DIRETTA</div>
</div>

<div class="status" id="statusEl">Connessione...</div>

<!-- SETUP -->
<div class="setup-panel" id="setupPanel">
  <div class="card">
    <div class="card-title">Squadre</div>
    <div class="input-row" style="margin-bottom:10px">
      <input type="text" id="homeName" placeholder="Casa" maxlength="20">
      <input type="text" id="awayName" placeholder="Ospiti" maxlength="20">
    </div>
    <button class="btn-primary" onclick="startMatch()">Inizia partita</button>
  </div>
</div>

<!-- LIVE SCOREBOARD -->
<div class="scoreboard" id="scoreboard">

  <div class="score-display">
    <div class="team-info">
      <div class="t-label">Casa</div>
      <div class="t-name" id="homeLabel">—</div>
    </div>
    <div class="score-mid">
      <div class="score-num" id="homeScore">0</div>
      <div class="score-sep">–</div>
      <div class="score-num" id="awayScore">0</div>
    </div>
    <div class="team-info">
      <div class="t-label">Ospiti</div>
      <div class="t-name" id="awayLabel">—</div>
    </div>
  </div>

  <div class="controls">
    <div class="team-ctrl">
      <div class="ctrl-label" id="homeCtrl">Casa</div>
      <div class="pts-row">
        <button class="btn-pts" onclick="add('home',1)">+1</button>
        <button class="btn-pts" onclick="add('home',2)">+2</button>
        <button class="btn-pts" onclick="add('home',3)">+3</button>
      </div>
      <button class="btn-undo" onclick="add('home',-1)">– 1 punto</button>
    </div>
    <div class="team-ctrl">
      <div class="ctrl-label" id="awayCtrl">Ospiti</div>
      <div class="pts-row">
        <button class="btn-pts" onclick="add('away',1)">+1</button>
        <button class="btn-pts" onclick="add('away',2)">+2</button>
        <button class="btn-pts" onclick="add('away',3)">+3</button>
      </div>
      <button class="btn-undo" onclick="add('away',-1)">– 1 punto</button>
    </div>
  </div>

  <div class="bottom-row">
    <button class="btn-action" onclick="resetScores()">Azzera</button>
    <button class="btn-action danger" onclick="newMatch()">Nuova partita</button>
  </div>

</div>

<div class="tagline">Il ferro è servito</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://sdeng-scoreboard-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchRef = ref(db, 'match');
  const statusEl = document.getElementById('statusEl');

  let scores = { home: 0, away: 0 };
  let names = { home: 'CASA', away: 'OSPITI' };

  // Listen for remote changes
  onValue(matchRef, (snapshot) => {
    statusEl.textContent = '● Connesso';
    statusEl.className = 'status connected';
    const data = snapshot.val();
    if (!data) return;
    scores.home = data.homeScore ?? 0;
    scores.away = data.awayScore ?? 0;
    names.home = data.homeName ?? 'CASA';
    names.away = data.awayName ?? 'OSPITI';
    updateUI();
  }, (error) => {
    statusEl.textContent = '✕ Errore connessione';
    statusEl.className = 'status error';
  });

  function updateUI(bumpTeam) {
    document.getElementById('homeScore').textContent = scores.home;
    document.getElementById('awayScore').textContent = scores.away;
    document.getElementById('homeLabel').textContent = names.home.toUpperCase();
    document.getElementById('awayLabel').textContent = names.away.toUpperCase();
    document.getElementById('homeCtrl').textContent = names.home.toUpperCase();
    document.getElementById('awayCtrl').textContent = names.away.toUpperCase();

    if (bumpTeam) {
      const el = document.getElementById(bumpTeam === 'home' ? 'homeScore' : 'awayScore');
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }
  }

  window.startMatch = function() {
    const h = document.getElementById('homeName').value.trim() || 'Casa';
    const a = document.getElementById('awayName').value.trim() || 'Ospiti';
    names.home = h;
    names.away = a;
    scores = { home: 0, away: 0 };

    set(matchRef, {
      homeName: h,
      awayName: a,
      homeScore: 0,
      awayScore: 0
    });

    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('scoreboard').classList.add('visible');
    updateUI();
  };

  window.add = function(team, pts) {
    scores[team] = Math.max(0, scores[team] + pts);
    const updateObj = {};
    updateObj[team === 'home' ? 'homeScore' : 'awayScore'] = scores[team];
    update(matchRef, updateObj);
    updateUI(pts > 0 ? team : null);
  };

  window.resetScores = function() {
    if (confirm('Azzerare il punteggio?')) {
      scores = { home: 0, away: 0 };
      update(matchRef, { homeScore: 0, awayScore: 0 });
      updateUI();
    }
  };

  window.newMatch = function() {
    if (confirm('Iniziare una nuova partita?')) {
      document.getElementById('homeName').value = '';
      document.getElementById('awayName').value = '';
      document.getElementById('setupPanel').classList.remove('hidden');
      document.getElementById('scoreboard').classList.remove('visible');
    }
  };
</script>
</body>
</html>
